<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oliveira Chopp — Estoque</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;--accent:#f5a623;--accent2:#d4881a;--text1:#fff;--text2:#a0a0a0;--border:#333;--success:#1d9e75;--danger:#e24b4a;--info:#378add}
body{background:#0f0f0f;font-family:'Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px}
.header{background:#1a1a1a;border-bottom:1px solid #333;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo-icon{width:36px;height:36px;background:#1d9e75;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:16px;font-weight:600;color:#fff}
.logo-sub{font-size:11px;color:var(--text2)}
.badge{background:#1d9e75;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.tabs{display:flex;background:#1a1a1a;border-bottom:1px solid #333;padding:0 16px;gap:4px}
.tab{padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:#fff}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px}
.stat{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:12px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-value{font-size:20px;font-weight:700}
.toolbar{display:flex;gap:10px;padding:0 14px 12px;align-items:center;flex-wrap:wrap}
.search{flex:1;min-width:180px;background:#242424;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:8px;font-size:13px;outline:none}
.search::placeholder{color:var(--text2)}
.search:focus{border-color:var(--accent)}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:#242424;color:#fff;border:1px solid #333}
.btn-ghost:hover{background:#2e2e2e}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 12px}
.cat-btn{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #333;background:#242424;color:#fff;transition:.15s}
.cat-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.table-wrap{padding:0 14px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;text-align:left;border-bottom:1px solid #333}
td{padding:10px 12px;font-size:13px;color:#fff;border-bottom:1px solid #222}
tr:hover td{background:#1a1a1a}
.item-cell{display:flex;align-items:center;gap:10px}
.item-emoji{width:32px;height:32px;background:#242424;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.item-name{font-size:13px;font-weight:600;color:#fff}
.item-cat{font-size:11px;color:var(--text2)}
.qty-ok{color:var(--success)}
.qty-aviso{color:var(--accent)}
.qty-critico{color:var(--danger)}
.status-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.status-ok{background:#1d9e7533;color:var(--success)}
.status-aviso{background:#f5a62333;color:var(--accent)}
.status-critico{background:#e24b4a33;color:#e24b4a}
.btn-sm{padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn-entrada{background:#1d9e7533;color:var(--success);border:1px solid #1d9e7566}
.btn-entrada:hover{background:var(--success);color:#fff}
.btn-baixa{background:#e24b4a22;color:var(--danger);border:1px solid #e24b4a44}
.btn-baixa:hover{background:var(--danger);color:#fff}
.progress-bar{width:100%;height:6px;background:#333;border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:.3s}
.hist-row{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.hist-tipo{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.hist-entrada{background:#1d9e7533;color:var(--success)}
.hist-saida{background:#e24b4a33;color:var(--danger)}
.hist-venda{background:#f5a62333;color:var(--accent)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:#1a1a1a;border:1px solid #333;border-radius:16px;padding:24px;width:100%;max-width:400px;margin:20px}
.modal h3{font-size:15px;font-weight:700;color:#fff;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.field input,.field select{width:100%;background:#242424;border:1px solid #333;color:#fff;padding:9px 12px;border-radius:8px;font-size:14px;outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#1a1a1a}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.section{display:none}.section.active{display:block}
.alerta-banner{background:#e24b4a22;border:1px solid #e24b4a44;border-radius:10px;padding:12px 16px;margin:0 14px 12px;display:flex;align-items:center;gap:10px;font-size:13px;color:#e24b4a}
.alerta-banner.hidden{display:none}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo-icon">📦</div>
    <div>
      <div class="logo-text">Oliveira Chopp</div>
      <div class="logo-sub">Controle de Estoque</div>
    </div>
  </div>
  <span class="badge">ESTOQUE</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('estoque')">Estoque</div>
  <div class="tab" onclick="showTab('historico')">Histórico</div>
</div>

<div class="section active" id="sec-estoque">
  <div class="stats" id="stats"></div>
  <div class="alerta-banner hidden" id="alerta-banner">⚠️ <span id="alerta-texto"></span></div>
  <div class="toolbar">
    <input class="search" placeholder="Buscar item..." oninput="renderTabela()" id="busca">
    <button class="btn btn-primary" onclick="abrirModalEntrada()">+ Entrada</button>
    <button class="btn btn-ghost" onclick="abrirModalNovo()">+ Novo Item</button>
  </div>
  <div class="cat-filter" id="cat-filter"></div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Item</th><th>Estoque</th><th>Mínimo</th><th>Status</th><th>Ações</th>
      </tr></thead>
      <tbody id="tabela-body"></tbody>
    </table>
  </div>
</div>

<div class="section" id="sec-historico">
  <div style="padding:14px 14px 8px;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.5px;text-transform:uppercase">Movimentações</div>
  <div style="padding:0 14px" id="hist-body"></div>
</div>

<!-- Modal Entrada -->
<div class="modal-bg hidden" id="modal-entrada">
  <div class="modal">
    <h3>📥 Entrada de Mercadoria</h3>
    <div class="field"><label>Item</label><select id="e-item"></select></div>
    <div class="field"><label>Quantidade</label><input id="e-qty" type="number" min="1" placeholder="Ex: 24"></div>
    <div class="field"><label>Observação</label><input id="e-obs" placeholder="Ex: Nota fiscal 1234"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="fecharModais()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarEntrada()">Confirmar</button>
    </div>
  </div>
</div>

<!-- Modal Baixa -->
<div class="modal-bg hidden" id="modal-baixa">
  <div class="modal">
    <h3>📤 Baixa Manual</h3>
    <div class="field"><label>Item</label><select id="b-item"></select></div>
    <div class="field"><label>Quantidade</label><input id="b-qty" type="number" min="1" placeholder="Ex: 5"></div>
    <div class="field"><label>Motivo</label>
      <select id="b-motivo">
        <option value="venda">Venda</option>
        <option value="perda">Perda/Quebra</option>
        <option value="consumo">Consumo Interno</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="fecharModais()">Cancelar</button>
      <button class="btn btn-primary" style="background:var(--danger);color:#fff" onclick="salvarBaixa()">Confirmar</button>
    </div>
  </div>
</div>

<!-- Modal Novo Item -->
<div class="modal-bg hidden" id="modal-novo">
  <div class="modal">
    <h3>➕ Novo Item no Estoque</h3>
    <div class="field"><label>Nome</label><input id="n-nome" placeholder="Ex: Chopp Pilsen 300ml"></div>
    <div class="field"><label>Categoria</label><select id="n-cat"></select></div>
    <div class="field"><label>Emoji</label><input id="n-emoji" placeholder="🍺" maxlength="2"></div>
    <div class="field"><label>Quantidade Inicial</label><input id="n-qty" type="number" min="0" placeholder="0"></div>
    <div class="field"><label>Estoque Mínimo (alerta)</label><input id="n-min" type="number" min="0" placeholder="Ex: 10"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="fecharModais()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarNovo()">Salvar</button>
    </div>
  </div>
</div>

<script>
const cats=[
  {id:1,nome:'Chopps',emoji:'🍺'},
  {id:2,nome:'Cervejas',emoji:'🍻'},
  {id:3,nome:'Churrasquinho',emoji:'🍢'},
  {id:4,nome:'Porções',emoji:'🍽️'},
  {id:5,nome:'Refrigerantes',emoji:'🥤'},
];
let itens=[
  {id:1,nome:'Chopp Pilsen 300ml',cat:1,emoji:'🍺',qty:48,min:20},
  {id:2,nome:'Chopp Pilsen 500ml',cat:1,emoji:'🍺',qty:36,min:15},
  {id:3,nome:'Chopp Escuro 300ml',cat:1,emoji:'🍺',qty:8,min:15},
  {id:4,nome:'Cerveja Lata',cat:2,emoji:'🍻',qty:72,min:24},
  {id:5,nome:'Cerveja Long Neck',cat:2,emoji:'🍻',qty:5,min:12},
  {id:6,nome:'Churrasquinho de Queijo',cat:3,emoji:'🍢',qty:30,min:10},
  {id:7,nome:'Churrasquinho de Carne',cat:3,emoji:'🍢',qty:25,min:10},
  {id:8,nome:'Churrasquinho de Frango',cat:3,emoji:'🍢',qty:20,min:10},
  {id:9,nome:'Churrasquinho Kafta',cat:3,emoji:'🍢',qty:15,min:10},
  {id:10,nome:'Porção de Fritas',cat:4,emoji:'🍟',qty:3,min:5},
  {id:11,nome:'Refrigerante Lata',cat:5,emoji:'🥤',qty:48,min:12},
  {id:12,nome:'Água Mineral',cat:5,emoji:'💧',qty:24,min:10},
];
let historico=[
  {tipo:'entrada',item:'Cerveja Lata',qty:48,obs:'Nota fiscal 001',hora:'08:30'},
  {tipo:'venda',item:'Chopp Pilsen 500ml',qty:3,obs:'Mesa 01',hora:'19:45'},
  {tipo:'perda',item:'Cerveja Long Neck',qty:2,obs:'Quebra',hora:'17:00'},
];
let catAtiva=0;
let nextId=20;

function statusInfo(qty,min){
  if(qty===0)return{cls:'qty-critico',badge:'status-critico',label:'Zerado',pct:0};
  if(qty<=min)return{cls:'qty-critico',badge:'status-critico',label:'Crítico',pct:Math.min(100,qty/min*100)};
  if(qty<=min*1.5)return{cls:'qty-aviso',badge:'status-aviso',label:'Atenção',pct:Math.min(100,qty/(min*2)*100)};
  return{cls:'qty-ok',badge:'status-ok',label:'Normal',pct:100};
}

function renderStats(){
  const total=itens.length;
  const criticos=itens.filter(i=>i.qty<=i.min).length;
  const zerados=itens.filter(i=>i.qty===0).length;
  const ok=itens.filter(i=>i.qty>i.min*1.5).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total de Itens</div><div class="stat-value" style="color:var(--accent)">${total}</div></div>
    <div class="stat"><div class="stat-label">Estoque Normal</div><div class="stat-value" style="color:var(--success)">${ok}</div></div>
    <div class="stat"><div class="stat-label">Em Alerta</div><div class="stat-value" style="color:var(--accent)">${criticos}</div></div>
    <div class="stat"><div class="stat-label">Zerados</div><div class="stat-value" style="color:var(--danger)">${zerados}</div></div>
  `;
  const alertas=itens.filter(i=>i.qty<=i.min);
  const banner=document.getElementById('alerta-banner');
  if(alertas.length){
    banner.classList.remove('hidden');
    document.getElementById('alerta-texto').textContent=`${alertas.length} item(s) com estoque baixo: ${alertas.map(i=>i.nome).join(', ')}`;
  }else{
    banner.classList.add('hidden');
  }
}

function renderCats(){
  document.getElementById('cat-filter').innerHTML=
    `<button class="cat-btn ${catAtiva===0?'active':''}" onclick="setCat(0)">Todos</button>`+
    cats.map(c=>`<button class="cat-btn ${catAtiva===c.id?'active':''}" onclick="setCat(${c.id})">${c.emoji} ${c.nome}</button>`).join('');
}
function setCat(id){catAtiva=id;renderCats();renderTabela();}

function renderTabela(){
  const busca=document.getElementById('busca').value.toLowerCase();
  const filtered=itens.filter(i=>(catAtiva===0||i.cat===catAtiva)&&i.nome.toLowerCase().includes(busca));
  const getCat=id=>cats.find(c=>c.id===id);
  document.getElementById('tabela-body').innerHTML=filtered.map(i=>{
    const s=statusInfo(i.qty,i.min);
    const pctColor=i.qty===0?'#e24b4a':i.qty<=i.min?'#e24b4a':i.qty<=i.min*1.5?'#f5a623':'#1d9e75';
    const pct=Math.min(100,i.qty/Math.max(i.min*2,1)*100);
    return `<tr>
      <td><div class="item-cell">
        <div class="item-emoji">${i.emoji}</div>
        <div><div class="item-name">${i.nome}</div><div class="item-cat">${getCat(i.cat)?getCat(i.cat).emoji+' '+getCat(i.cat).nome:''}</div></div>
      </div></td>
      <td><div class="${s.cls}" style="font-size:15px;font-weight:700">${i.qty}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pctColor}"></div></div>
      </td>
      <td style="color:var(--text2)">${i.min}</td>
      <td><span class="status-badge ${s.badge}">${s.label}</span></td>
      <td><div style="display:flex;gap:6px">
        <button class="btn-sm btn-entrada" onclick="abrirEntradaItem(${i.id})">+ Entrada</button>
        <button class="btn-sm btn-baixa" onclick="abrirBaixaItem(${i.id})">− Baixa</button>
      </div></td>
    </tr>`;
  }).join('');
}

function renderHistorico(){
  const el=document.getElementById('hist-body');
  if(!historico.length){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text2);font-size:13px">Nenhuma movimentação</div>';return;}
  el.innerHTML=historico.map(h=>`<div class="hist-row">
    <span class="hist-tipo ${h.tipo==='entrada'?'hist-entrada':h.tipo==='venda'?'hist-venda':'hist-saida'}">${h.tipo==='entrada'?'Entrada':h.tipo==='venda'?'Venda':'Saída'}</span>
    <div style="flex:1"><div style="font-size:13px;color:#fff;font-weight:600">${h.item}</div><div style="font-size:11px;color:var(--text2)">${h.obs}</div></div>
    <div style="text-align:right"><div style="font-size:14px;font-weight:700;color:${h.tipo==='entrada'?'var(--success)':'var(--danger)'}">${h.tipo==='entrada'?'+':'-'}${h.qty}</div><div style="font-size:11px;color:var(--text2)">${h.hora}</div></div>
  </div>`).join('');
}

function showTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  ['estoque','historico'].forEach((tab,i)=>document.querySelectorAll('.tab')[i].classList.toggle('active',tab===t));
  document.getElementById('sec-'+t).classList.add('active');
  if(t==='historico')renderHistorico();
}

function popularSelect(selId){
  document.getElementById(selId).innerHTML=itens.map(i=>`<option value="${i.id}">${i.emoji} ${i.nome}</option>`).join('');
}

function abrirModalEntrada(){popularSelect('e-item');document.getElementById('e-qty').value='';document.getElementById('e-obs').value='';document.getElementById('modal-entrada').classList.remove('hidden');}
function abrirEntradaItem(id){abrirModalEntrada();document.getElementById('e-item').value=id;}
function abrirBaixaItem(id){popularSelect('b-item');document.getElementById('b-qty').value='';document.getElementById('modal-baixa').classList.remove('hidden');document.getElementById('b-item').value=id;}
function abrirModalNovo(){
  document.getElementById('n-cat').innerHTML=cats.map(c=>`<option value="${c.id}">${c.emoji} ${c.nome}</option>`).join('');
  ['n-nome','n-emoji','n-qty','n-min'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-novo').classList.remove('hidden');
}
function fecharModais(){document.querySelectorAll('.modal-bg').forEach(m=>m.classList.add('hidden'));}

function agora(){const now=new Date();return now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');}

function salvarEntrada(){
  const id=parseInt(document.getElementById('e-item').value);
  const qty=parseInt(document.getElementById('e-qty').value)||0;
  const obs=document.getElementById('e-obs').value||'Entrada manual';
  if(!qty||qty<1)return alert('Informe a quantidade!');
  const item=itens.find(x=>x.id===id);
  item.qty+=qty;
  historico.unshift({tipo:'entrada',item:item.nome,qty,obs,hora:agora()});
  fecharModais();renderTabela();renderStats();
}

function salvarBaixa(){
  const id=parseInt(document.getElementById('b-item').value);
  const qty=parseInt(document.getElementById('b-qty').value)||0;
  const motivo=document.getElementById('b-motivo').value;
  if(!qty||qty<1)return alert('Informe a quantidade!');
  const item=itens.find(x=>x.id===id);
  if(qty>item.qty)return alert('Quantidade maior que o estoque disponível!');
  item.qty-=qty;
  historico.unshift({tipo:motivo==='venda'?'venda':'perda',item:item.nome,qty,obs:motivo.charAt(0).toUpperCase()+motivo.slice(1),hora:agora()});
  fecharModais();renderTabela();renderStats();
}

function salvarNovo(){
  const nome=document.getElementById('n-nome').value.trim();
  const cat=parseInt(document.getElementById('n-cat').value);
  const emoji=document.getElementById('n-emoji').value||'📦';
  const qty=parseInt(document.getElementById('n-qty').value)||0;
  const min=parseInt(document.getElementById('n-min').value)||5;
  if(!nome)return alert('Informe o nome!');
  itens.push({id:nextId++,nome,cat,emoji,qty,min});
  fecharModais();renderCats();renderTabela();renderStats();
}

renderStats();
renderCats();
renderTabela();
renderHistorico();
</script>
</body>
</html>
