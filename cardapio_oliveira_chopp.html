<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Oliveira Chopp — Cardápio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--accent:#f5a623;--accent2:#d4881a;--text1:#fff;--text2:#a0a0a0;--border:#2e2e2e;--success:#1d9e75;--danger:#e24b4a}
body{background:var(--bg1);font-family:'Segoe UI',sans-serif;min-height:100vh;padding-bottom:100px}
.phone{max-width:390px;margin:0 auto;background:var(--bg1);min-height:100vh}
.top-bar{background:var(--bg2);padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.top-logo{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.top-info{flex:1}
.top-nome{font-size:16px;font-weight:700;color:#fff}
.top-mesa{font-size:12px;color:var(--text2);margin-top:2px}
.top-badge{background:var(--success);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.cats-bar{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border)}
.cats-bar::-webkit-scrollbar{display:none}
.cat-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:#fff;white-space:nowrap;flex-shrink:0;transition:.15s}
.cat-pill.active{background:var(--accent);color:#000;border-color:var(--accent)}
.section-title{font-size:13px;font-weight:700;color:var(--accent);padding:16px 16px 8px;letter-spacing:.5px;text-transform:uppercase}
.items-list{padding:0 12px;display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;overflow:hidden;transition:.2s}
.item-card:active{transform:scale(.98)}
.item-img{width:90px;height:90px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px}
.item-img img{width:90px;height:90px;object-fit:cover}
.item-body{flex:1;padding:12px;min-width:0}
.item-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:3px}
.item-desc{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.4}
.item-bottom{display:flex;align-items:center;justify-content:space-between}
.item-price{font-size:16px;font-weight:700;color:var(--accent)}
.add-btn{width:32px;height:32px;background:var(--accent);border:none;border-radius:8px;color:#000;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.add-btn:active{background:var(--accent2);transform:scale(.92)}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-num{font-size:14px;font-weight:700;color:#fff;min-width:18px;text-align:center}
.cart-bar{background:var(--accent);border-radius:14px;margin:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.15s}
.cart-bar:active{background:var(--accent2)}
.cart-left{display:flex;align-items:center;gap:10px}
.cart-count{background:#000;color:var(--accent);font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px}
.cart-label{font-size:14px;font-weight:700;color:#000}
.cart-total{font-size:16px;font-weight:700;color:#000}
.hidden{display:none}
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-wrap.hidden{display:none}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:390px;padding:20px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--bg3);border:none;color:var(--text2);font-size:18px;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pedido-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.pedido-nome{font-size:13px;color:#fff}
.pedido-qty{font-size:12px;color:var(--text2)}
.pedido-preco{font-size:13px;font-weight:700;color:var(--accent)}
.obs-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:#fff;padding:10px 12px;border-radius:10px;font-size:13px;margin:12px 0;outline:none;resize:none}
.obs-input::placeholder{color:var(--text2)}
.total-row{display:flex;justify-content:space-between;padding:12px 0;font-size:15px;font-weight:700;color:#fff}
.total-val{color:var(--accent)}
.enviar-btn{width:100%;background:var(--accent);color:#000;font-size:15px;font-weight:700;padding:14px;border:none;border-radius:12px;cursor:pointer;transition:.15s}
.enviar-btn:active{background:var(--accent2)}
.sucesso{text-align:center;padding:30px 0}
.sucesso-icon{font-size:48px;margin-bottom:12px}
.sucesso-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px}
.sucesso-sub{font-size:13px;color:var(--text2);line-height:1.6}
</style>
</head>
<body>

<div class="phone">
  <div class="top-bar">
    <div class="top-logo">🍺</div>
    <div class="top-info">
      <div class="top-nome">Oliveira Chopp</div>
      <div class="top-mesa" id="mesa-label">Mesa 01</div>
    </div>
    <span class="top-badge">Aberto</span>
  </div>

  <div class="cats-bar" id="cats-bar"></div>
  <div id="cardapio-body"></div>

  <div id="cart-bar-wrap" class="hidden">
    <div class="cart-bar" onclick="abrirModal()">
      <div class="cart-left">
        <span class="cart-count" id="cart-count">0</span>
        <span class="cart-label">Ver pedido</span>
      </div>
      <span class="cart-total" id="cart-total">R$ 0,00</span>
    </div>
  </div>
</div>

<div class="modal-wrap hidden" id="modal-wrap">
  <div class="modal">
    <div class="modal-title">
      <span>Meu Pedido</span>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const mesa = urlParams.get('mesa') || '01';
document.getElementById('mesa-label').textContent = 'Mesa ' + mesa;

const cats=[
  {id:1,nome:'Chopps',emoji:'🍺'},
  {id:2,nome:'Cervejas',emoji:'🍻'},
  {id:3,nome:'Churrasquinho',emoji:'🍢'},
  {id:4,nome:'Porções',emoji:'🍽️'},
  {id:5,nome:'Refrigerantes',emoji:'🥤'}
];
const items=[
  {id:1,nome:'Chopp Pilsen 300ml',desc:'Gelado, cremoso, perfeito',cat:1,preco:8.00,emoji:'🍺'},
  {id:2,nome:'Chopp Pilsen 500ml',desc:'O favorito da galera',cat:1,preco:12.00,emoji:'🍺'},
  {id:3,nome:'Chopp Escuro 300ml',desc:'Encorpado e saboroso',cat:1,preco:9.00,emoji:'🍺'},
  {id:4,nome:'Cerveja Lata',desc:'350ml bem gelada',cat:2,preco:7.00,emoji:'🍻'},
  {id:5,nome:'Cerveja Long Neck',desc:'Long neck 355ml',cat:2,preco:10.00,emoji:'🍻'},
  {id:6,nome:'Churrasquinho de Queijo',desc:'Queijo coalho na brasa',cat:3,preco:5.00,emoji:'🍢'},
  {id:7,nome:'Churrasquinho de Carne',desc:'Carne temperada na brasa',cat:3,preco:6.00,emoji:'🍢'},
  {id:8,nome:'Churrasquinho de Frango',desc:'Frango suculento na brasa',cat:3,preco:6.00,emoji:'🍢'},
  {id:9,nome:'Churrasquinho Kafta',desc:'Kafta árabe temperado',cat:3,preco:7.00,emoji:'🍢'},
  {id:10,nome:'Porção de Fritas',desc:'Batata frita crocante',cat:4,preco:18.00,emoji:'🍟'},
  {id:11,nome:'Refrigerante Lata',desc:'Coca, Guaraná ou Sprite',cat:5,preco:5.00,emoji:'🥤'},
  {id:12,nome:'Água Mineral',desc:'500ml com ou sem gás',cat:5,preco:3.00,emoji:'💧'},
];
let cart={};
let catAtiva=0;

function renderCats(){
  const bar=document.getElementById('cats-bar');
  bar.innerHTML=`<span class="cat-pill ${catAtiva===0?'active':''}" onclick="setCat(0)">Todos</span>`+
    cats.map(c=>`<span class="cat-pill ${catAtiva===c.id?'active':''}" onclick="setCat(${c.id})">${c.emoji} ${c.nome}</span>`).join('');
}
function setCat(id){catAtiva=id;renderCats();renderCardapio();}

function renderCardapio(){
  const body=document.getElementById('cardapio-body');
  const grupos=catAtiva===0?cats:cats.filter(c=>c.id===catAtiva);
  body.innerHTML=grupos.map(c=>{
    const its=items.filter(i=>i.cat===c.id);
    if(!its.length)return '';
    return `<div class="section-title">${c.emoji} ${c.nome}</div>
    <div class="items-list">${its.map(i=>itemHTML(i)).join('')}</div>`;
  }).join('');
}

function itemHTML(i){
  const qty=cart[i.id]||0;
  const ctrl=qty>0
    ?`<div class="qty-ctrl">
        <button class="qty-btn" onclick="remover(${i.id})">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" style="background:var(--accent);color:#000;border-color:var(--accent)" onclick="adicionar(${i.id})">+</button>
      </div>`
    :`<button class="add-btn" onclick="adicionar(${i.id})">+</button>`;
  return `<div class="item-card">
    <div class="item-img"><span style="font-size:36px">${i.emoji}</span></div>
    <div class="item-body">
      <div class="item-name">${i.nome}</div>
      <div class="item-desc">${i.desc}</div>
      <div class="item-bottom">
        <span class="item-price">R$ ${i.preco.toFixed(2)}</span>
        ${ctrl}
      </div>
    </div>
  </div>`;
}

function adicionar(id){cart[id]=(cart[id]||0)+1;updateCart();renderCardapio();}
function remover(id){if(cart[id]>0)cart[id]--;if(cart[id]===0)delete cart[id];updateCart();renderCardapio();}

function updateCart(){
  const total=Object.entries(cart).reduce((s,[id,q])=>{const i=items.find(x=>x.id==id);return s+(i?i.preco*q:0);},0);
  const count=Object.values(cart).reduce((s,q)=>s+q,0);
  const wrap=document.getElementById('cart-bar-wrap');
  if(count>0){
    wrap.classList.remove('hidden');
    document.getElementById('cart-count').textContent=count;
    document.getElementById('cart-total').textContent='R$ '+total.toFixed(2);
  }else{
    wrap.classList.add('hidden');
  }
}

function abrirModal(){
  document.getElementById('modal-wrap').classList.remove('hidden');
  const itens=Object.entries(cart).map(([id,qty])=>{
    const i=items.find(x=>x.id==id);
    return `<div class="pedido-item">
      <div><div class="pedido-nome">${i.emoji} ${i.nome}</div><div class="pedido-qty">${qty}x R$ ${i.preco.toFixed(2)}</div></div>
      <span class="pedido-preco">R$ ${(i.preco*qty).toFixed(2)}</span>
    </div>`;
  }).join('');
  const total=Object.entries(cart).reduce((s,[id,q])=>{const i=items.find(x=>x.id==id);return s+(i?i.preco*q:0);},0);
  document.getElementById('modal-body').innerHTML=`
    ${itens}
    <textarea class="obs-input" rows="2" placeholder="Observações (opcional)..."></textarea>
    <div class="total-row"><span>Total</span><span class="total-val">R$ ${total.toFixed(2)}</span></div>
    <button class="enviar-btn" onclick="enviarPedido()">Enviar Pedido para a Cozinha</button>
  `;
}
function fecharModal(){document.getElementById('modal-wrap').classList.add('hidden');}

function enviarPedido(){
  document.getElementById('modal-body').innerHTML=`
    <div class="sucesso">
      <div class="sucesso-icon">✅</div>
      <div class="sucesso-title">Pedido enviado!</div>
      <div class="sucesso-sub">Seu pedido foi para a cozinha.<br>Aguarde, estamos preparando tudo!</div>
    </div>
  `;
  cart={};
  updateCart();
  setTimeout(()=>{fecharModal();renderCardapio();},2500);
}

renderCats();
renderCardapio();
</script>
</body>
</html>
